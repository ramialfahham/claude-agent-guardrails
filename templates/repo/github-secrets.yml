# Copied to .github/workflows/security-secrets.yml by setup-dbt-project.
# Scans the diff (and full history on push to main) for committed secrets with gitleaks,
# and blocks the PR if any are found.
name: security-secrets

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
